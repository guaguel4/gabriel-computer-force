<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Computer Force - Register</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="grid-container">
        <!-- Header -->
        <header>
            <div class="mobile-controls">
                <button class="burger-btn" aria-label="Toggle Menu">☰</button>
                <button class="bag-btn" aria-label="Toggle Purchases">👜</button>
            </div>
            <h1><a href="index.html">Computer Force</a></h1>
        </header>

        <!-- Navigation -->
        <nav>
            <div class="nav-links">
                <a href="products.html">Products</a>
                <a href="register.html">Register</a>
                <a href="about.html">About</a>
                <a href="gabriel.html">Gabriel</a>
            </div>
            <form class="search-bar">
                <input type="text" class="search-input" placeholder="Search products...">
                <button type="submit" class="btn-search">Search</button>
            </form>
        </nav>

        <!-- Main Content -->
        <main>
            <h1>Registration Form</h1>
            <p>Please fill out the form below to create your account. Fields marked with * are required.</p>
            
            <form action="#" method="POST" class="register-form">
                <div class="form-group">
                    <label for="username">Username*</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="email">Email*</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password*</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <div class="form-group">
                    <label for="confirm-password">Confirm Password*</label>
                    <input type="password" id="confirm-password" name="confirm-password" required>
                </div>
                <div class="form-group">
                    <label for="firstname">First Name*</label>
                    <input type="text" id="firstname" name="firstname" required>
                </div>
                <div class="form-group">
                    <label for="surname">Surname*</label>
                    <input type="text" id="surname" name="surname" required>
                </div>
                <div class="form-group">
                    <label>Gender*</label>
                    <div style="display: flex; gap: 1rem; align-items: center;">
                        <input type="radio" id="male" name="gender" value="male" required style="width: auto;"> <label for="male" style="margin-bottom: 0;">Male</label>
                        <input type="radio" id="female" name="gender" value="female" required style="width: auto;"> <label for="female" style="margin-bottom: 0;">Female</label>
                        <input type="radio" id="other" name="gender" value="other" required style="width: auto;"> <label for="other" style="margin-bottom: 0;">Other</label>
                    </div>
                </div>
                <div class="form-group">
                    <label for="address">Address*</label>
                    <input type="text" id="address" name="address" required>
                </div>
                <div class="form-group">
                    <label for="suburb">Suburb*</label>
                    <input type="text" id="suburb" name="suburb" required>
                </div>
                <div class="form-group">
                    <label for="postcode">Postcode*</label>
                    <input type="text" id="postcode" name="postcode" required pattern="[0-9]{4}">
                </div>
                <div class="form-group">
                    <label for="state">State*</label>
                    <select id="state" name="state" required>
                        <option value="">Select a state</option>
                        <option value="ACT">ACT</option>
                        <option value="NSW">NSW</option>
                        <option value="NT">NT</option>
                        <option value="QLD">QLD</option>
                        <option value="SA">SA</option>
                        <option value="TAS">TAS</option>
                        <option value="VIC">VIC</option>
                        <option value="WA">WA</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="dob">Date of Birth</label>
                    <input type="date" id="dob" name="dob">
                </div>
                <div class="form-group">
                    <label for="phone">Phone number</label>
                    <input type="tel" id="phone" name="phone">
                </div>
                
                <div class="form-actions">
                    <button type="reset" class="btn-clear">Clear</button>
                    <button type="submit" class="btn-submit">Register</button>
                </div>
            </form>
        </main>

        <!-- Aside (Purchases) -->
        <aside>
            <h2>Purchases</h2>
            <table class="purchases-table">
                <thead>
                    <tr>
                        <th>Item</th>
                        <th>Price (AUD)</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Test Item 1</td>
                        <td>$1000</td>
                    </tr>
                    <tr>
                        <td>Test Item 2</td>
                        <td>$500</td>
                    </tr>
                    <tr class="total-row">
                        <td>Total</td>
                        <td>$1500</td>
                    </tr>
                </tbody>
            </table>
            <button class="btn-checkout">Go to Checkout</button>
        </aside>

        <!-- Footer -->
        <footer>
            <p>&copy; 2026 Computer Force. All Rights Reserved.</p>
        </footer>
    </div>
</body>
</html>
